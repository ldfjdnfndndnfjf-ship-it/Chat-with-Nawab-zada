<!DOCTYPE html>
<html>
<head>
    <title>Nawab ZADA HACKER 🦅 Chat</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; }
        #chat-screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* Chat Bubbles */
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .sent { background: #004d00; align-self: flex-end; margin-left: auto; }
        .received { background: #333; align-self: flex-start; }
        
        /* Admin Section */
        .admin-panel { background: #111; padding: 10px; border-top: 2px solid #00ff00; }
        input, button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 8px; }
    </style>
</head>
<body>
    <div id="login">
        <h2>🦅 ENTER IDENTIFICATION</h2>
        <input id="userName" placeholder="Your Real Name">
        <button onclick="login()">SECURE JOIN</button>
    </div>

    <div id="chat-screen" style="display:none;">
        <div id="messages"></div>
        <div class="admin-panel">
            <input id="msg" placeholder="Type message...">
            <button onclick="send()">SEND</button>
            <br><br>
            <input type="password" id="adminPass" placeholder="Admin Pass">
            <button onclick="checkAdmin()">TRACK LOGS</button>
            <div id="adminArea" style="display:none;"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        function login() {
            myName = document.getElementById('userName').value;
            if(myName) { document.getElementById('login').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex'; }
        }

        function send() {
            let msg = document.getElementById('msg').value;
            socket.emit('chat message', {name: myName, msg: msg});
            document.getElementById('msg').value = "";
        }

        socket.on('chat message', (data) => {
            const isMe = data.name === myName;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<b>${data.name}</b>: ${data.msg}`;
            document.getElementById('messages').appendChild(div);
            
            // Log to Admin (IP logger)
            document.getElementById('adminArea').innerHTML += `<p>${data.name} [${data.ip}]: ${data.msg}</p>`;
        });

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "NawabZada123") {
                document.getElementById('adminArea').style.display = 'block';
            }
        }
    </script>
</body>
</html>
