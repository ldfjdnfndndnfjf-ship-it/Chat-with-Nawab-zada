<!DOCTYPE html>
<html>
<head>
    <title>Nawab ZADA Chat</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; }
        #chat-screen { max-width: 500px; margin: auto; background: white; padding: 20px; }
        .msg-box { border-bottom: 1px solid #ccc; padding: 5px; }
        .admin-area { position: fixed; bottom: 10px; right: 10px; background: #333; color: #fff; padding: 10px; border-radius: 10px; max-height: 200px; overflow-y: scroll; }
        .input-area { display: flex; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <h2>🦅 CHAT WITH NAWAB ZADA</h2>
        <input id="userName" placeholder="Real Name">
        <button onclick="login()">Join</button>
    </div>

    <div id="chat-screen" style="display:none;">
        <h3>🦅 Chat with Nawab ZADA</h3>
        <div id="messages" style="height: 300px; overflow-y: scroll;"></div>
        <div class="input-area">
            <input id="msg" placeholder="Type a message...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <div class="admin-area">
        <input type="password" id="adminPass" placeholder="Admin Pass">
        <button onclick="checkAdmin()">Open Logs</button>
        <div id="adminArea" style="display:none;">
            <div id="ipLogs"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        function login() {
            myName = document.getElementById('userName').value;
            if(myName) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'block'; }
        }

        function send() {
            let msg = document.getElementById('msg').value;
            // Auto-filter (Bad words/Links)
            if(msg.includes("http") || msg.toLowerCase().includes("gali")) {
                alert("Nawab ZADA Security: Message blocked!");
                return;
            }
            socket.emit('chat message', {name: myName, msg: msg});
            document.getElementById('msg').value = "";
        }

        socket.on('chat message', (data) => {
            document.getElementById('messages').innerHTML += `<div class="msg-box"><b>${data.name}</b>: ${data.msg}</div>`;
            document.getElementById('ipLogs').innerHTML += `<p>${data.name}: ${data.msg} (IP: ${data.ip}) <button onclick="this.parentElement.remove()">Block</button></p>`;
        });

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "NawabZada123") {
                document.getElementById('adminArea').style.display = 'block';
            }
        }
    </script>
</body>
</html>
