<!DOCTYPE html>
<html>
<head>
    <title>Nawab ZADA VIP Chat Room</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        /* Header Banner */
        #header { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #00ff00; font-weight: bold; }
        /* Messages Area */
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; margin: 5px; border-radius: 15px; max-width: 80%; }
        .sent { background: #004d00; align-self: flex-end; }
        .received { background: #333; align-self: flex-start; }
        .username { font-size: 0.7em; display: block; margin-bottom: 2px; color: #aaa; }
        /* Input Area */
        #input-area { background: #111; padding: 10px; display: flex; gap: 5px; }
        input, button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 5px; }
        #msg { flex: 1; }
        .admin-area { font-size: 0.8em; margin-top: 5px; background: #1a1a1a; padding: 5px; }
    </style>
</head>
<body>
    <div id="login" style="padding:20px;">
        <h2>🦅 ENTER IDENTIFICATION</h2>
        <input id="userName" placeholder="Your Real Name" style="width:90%">
        <button onclick="login()" style="width:95%; margin-top:10px">SECURE JOIN</button>
    </div>

    <div id="chat-screen" style="display:none; flex: 1; flex-direction: column;">
        <div id="header">Chat with Nawab ZADA 🦅</div>
        <div id="messages"></div>
        <div id="input-area">
            <input id="msg" placeholder="Type message...">
            <button onclick="send()">SEND</button>
        </div>
        <div style="padding:5px;">
            <input type="password" id="adminPass" placeholder="Admin Pass" style="width:40%">
            <button onclick="checkAdmin()">TRACK LOGS</button>
            <div id="adminArea" class="admin-area" style="display:none;"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myName = "";

        function login() {
            myName = document.getElementById('userName').value;
            if(myName) { document.getElementById('login').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex'; }
        }

        function send() {
            let msg = document.getElementById('msg').value;
            if(msg) {
                socket.emit('chat message', {name: myName, msg: msg});
                document.getElementById('msg').value = "";
            }
        }

        socket.on('chat message', (data) => {
            const isMe = data.name === myName;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            div.innerHTML = `<span class="username">${data.name}</span>${data.msg}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            
            // Admin Log with Block Button
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `${data.name} [${data.ip}]: ${data.msg} 
                                  <button onclick="socket.emit('block-ip', '${data.ip}'); this.parentElement.remove();">BLOCK</button>`;
            document.getElementById('adminArea').appendChild(logEntry);
        });

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "NawabZada123") {
                document.getElementById('adminArea').style.display = 'block';
            } else { alert("Wrong Password!"); }
        }
    </script>
</body>
</html>
